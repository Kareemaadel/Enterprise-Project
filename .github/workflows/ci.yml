name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: workhub
          POSTGRES_USER: workhub_user
          POSTGRES_PASSWORD: workhub_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/workhub
          SPRING_DATASOURCE_USERNAME: workhub_user
          SPRING_DATASOURCE_PASSWORD: workhub_pass
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Build application
        run: mvn -DskipTests package

      - name: Build Docker image
        run: docker build -t workhub:${{ github.sha }} .
